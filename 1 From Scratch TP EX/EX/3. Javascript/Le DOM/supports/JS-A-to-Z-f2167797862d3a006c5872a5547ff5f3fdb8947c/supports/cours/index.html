<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="click-event box">
        <h4>Quelle est la Capitale de la France ?</h4>
        <button id="btn-1">Paris</button>
        <button id="btn-2">Londres</button>
        <p>La reponse est Paris</p>
    </div>

    <div class="mousemove"></div>

    <div class="keypress box">
        <h2>Vous appuyer sur la touche : <span id="key"></span></h2>
    </div>

    <nav>
        <ul>
            <li>Accueil</li>
            <li>À propos</li>
            <li>Contact</li>
        </ul>
    </nav>

    <form action="" class="box">
        <input type="text" placeholder="Nom">
        <select>
            <option value="" selected>Choisir un pays</option>
            <option value="france">France</option>
            <option value="royaume-uni">Royaume-Uni</option>
            <option value="espagne">Espagne</option>
        </select>

        <input type="checkbox" id="cgv" >
        <label for="cgv" >J'accepte les CGV</label>
        <input type="submit" value="Valider">
        <div></div>
    </form>

    <script src="index.js"></script>
</body>
</html>
