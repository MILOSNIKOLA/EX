<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculatrice</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --btn: #1f2937;
      --btn2: #334155;
      --accent: #f59e0b;
      --text: #e5e7eb;
    }

    * {
      box-sizing: border-box;
      font-family: Inter, system-ui, Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: var(--text);
    }

    .calc {
      width: min(92vw, 360px);
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .display {
      width: 100%;
      height: 86px;
      border: none;
      border-radius: 18px;
      padding: 16px;
      background: #020617;
      color: var(--text);
      font-size: 2rem;
      text-align: right;
      outline: none;
      margin-bottom: 16px;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 18px;
      height: 64px;
      font-size: 1.15rem;
      color: var(--text);
      background: var(--btn);
      cursor: pointer;
      transition: 0.15s transform, 0.15s opacity;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
      opacity: 0.9;
    }

    .op {
      background: var(--btn2);
    }

    .accent {
      background: var(--accent);
      color: #111827;
      font-weight: 700;
    }

    .wide {
      grid-column: span 2;
    }
  </style>
</head>
<body>
  <div class="calc">
    <input id="display" class="display" type="text" value="0" readonly />
    <div class="keys">
      <button class="op" onclick="clearDisplay()">C</button>
      <button class="op" onclick="backspace()">⌫</button>
      <button class="op" onclick="append('%')">%</button>
      <button class="op" onclick="append('/')">÷</button>

      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button class="op" onclick="append('*')">×</button>

      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button class="op" onclick="append('-')">−</button>

      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button class="op" onclick="append('+')">+</button>

      <button class="wide" onclick="append('0')">0</button>
      <button onclick="append('.')">.</button>
      <button class="accent" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    const display = document.getElementById('display');

    function append(value) {
      if (display.value === '0' && /[0-9.]/.test(value)) display.value = '';
      display.value += value;
    }

    function clearDisplay() {
      display.value = '0';
    }

    function backspace() {
      display.value = display.value.length > 1 ? display.value.slice(0, -1) : '0';
    }

    function calculate() {
      try {
        const result = Function('return (' + display.value + ')')();
        display.value = Number.isFinite(result) ? String(result) : 'Erreur';
      } catch {
        display.value = 'Erreur';
      }
    }

    document.addEventListener('keydown', (e) => {
      if (/^[0-9.+\-*/%]$/.test(e.key)) append(e.key);
      if (e.key === 'Enter') calculate();
      if (e.key === 'Backspace') backspace();
      if (e.key === 'Escape') clearDisplay();
    });
  </script>
</body>
</html>
