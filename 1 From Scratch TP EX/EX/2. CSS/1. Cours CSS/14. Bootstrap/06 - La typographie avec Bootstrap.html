<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exemple du la typographie avec Bootstrap</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
      crossorigin="anonymous"
    />
  </head>
  <style>
    body {
      background-color: rgba(0, 0, 0, 0.979);
      padding: 5px;
    }
    h1,h2,h3,h4,h5,h6,p {
      color: white;
    }
    li {
        color: rgb(139, 137, 137);
    }
  </style>
  <body>

    <div class="container mt-5">
        <h1 class="display-1">Balise H1</h1>
        <h2>Balise H2</h2>
        <h3>Balise H3</h3>
        <h4>Balise H4</h4>
        <h5>Balise H5</h5>
        <h6>Balise H6</h6>
        <p class="display-2">Mettre en evidence du txt</p>
        <h2>Liste a puces</h2>
        <ul class="list-inline"">
            <li>Element 1</li>
            <li>Element 2</li>
            <li>Element 3</li>
            <li>Element 4</li>
            <li>Element 5</li>
        </ul>
        <h2>Liste ordonnées</h2>
        <ol class="list-unstyled">
            <li class="list-inline-item">Element 1</li>
            <li class="list-inline-item">Element 2</li>
            <li class="list-inline-item">Element 3</li>
            <li class="list-inline-item">Element 4</li>
            <li class="list-inline-item">Element 5</li>
        </ol>
    </div>

      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"

      crossorigin="anonymous"
    ></script>
  </body>
</html>
